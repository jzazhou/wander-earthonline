<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd66e" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ffd66e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- deep space square -->
  <rect width="32" height="32" rx="5" fill="#0a0c1a" />
  <rect x="0.5" y="0.5" width="31" height="31" rx="4.5" fill="none" stroke="#2a3358" />

  <!-- distant stars -->
  <rect x="5" y="6" width="1" height="1" fill="#9fb4ff" opacity="0.85" />
  <rect x="26" y="8" width="1" height="1" fill="#9fb4ff" opacity="0.7" />
  <rect x="7" y="25" width="1" height="1" fill="#9fb4ff" opacity="0.7" />
  <rect x="25" y="24" width="1" height="1" fill="#9fb4ff" opacity="0.6" />

  <!-- glow behind the star -->
  <circle cx="16" cy="16" r="11" fill="url(#glow)" />

  <!-- gold pixel star (4-point) -->
  <g fill="#ffd66e">
    <rect x="14" y="2" width="4" height="4" />
    <rect x="14" y="6" width="4" height="4" />
    <rect x="10" y="10" width="4" height="4" />
    <rect x="14" y="10" width="4" height="4" />
    <rect x="18" y="10" width="4" height="4" />
    <rect x="2" y="14" width="4" height="4" />
    <rect x="6" y="14" width="4" height="4" />
    <rect x="10" y="14" width="4" height="4" />
    <rect x="18" y="14" width="4" height="4" />
    <rect x="22" y="14" width="4" height="4" />
    <rect x="26" y="14" width="4" height="4" />
    <rect x="10" y="18" width="4" height="4" />
    <rect x="14" y="18" width="4" height="4" />
    <rect x="18" y="18" width="4" height="4" />
    <rect x="14" y="22" width="4" height="4" />
    <rect x="14" y="26" width="4" height="4" />
  </g>
  <!-- bright core -->
  <rect x="14" y="14" width="4" height="4" fill="#fff3c0" />
</svg>
